apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: k8s-app
  template:
    metadata:
      labels:
        app: k8s-app
    spec:
      containers:
      - name: k8s-app
        image: ghcr.io/iwantmany/k8s:latest
        ports:
        - containerPort: 8000
        env:
        - name: DB_HOST
          value: "haproxy.postgres-ha.svc.cluster.local"
        - name: DB_PORT
          value: "5000"
        - name: DB_NAME
          value: "testdb"
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          value: "SuperPass!2024"
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
